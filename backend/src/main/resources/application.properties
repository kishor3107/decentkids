# ========================
# Decent Kids Wear Backend
# ========================

# Server
server.port=8080
server.servlet.context-path=/api

# Database — PostgreSQL via Docker
spring.datasource.url=jdbc:postgresql://localhost:5433/decentkids_db
spring.datasource.username=postgres
spring.datasource.password=decentkids@123
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# JWT
app.jwt.secret=decentkidswear_super_secret_jwt_key_change_in_production_32chars
app.jwt.expiration-ms=86400000

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS
app.cors.allowed-origins=http://localhost:3000,https://decentkids.dominal.in

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/
